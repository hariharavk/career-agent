server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and WebSocket requests to the backend container internally
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Proxy healthz for readiness probes
    location /healthz {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback: serve index.html for client-side routes (react-router),
    # so deep-linking and refreshing on /settings, /analytics, etc. work.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
