<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 240 10% 4%;
      --card: 240 10% 7%;
      --primary: 217.2 91.2% 59.8%;
      --primary-hover: 224.3 76.3% 48%;
      --border: 240 5.9% 15%;
      --text: 0 0% 98%;
      --muted: 240 5% 64.9%;
      --success: 142.1 76.2% 36.3%;
      --error: 346.8 77.2% 49.8%;
    }

    body {
      width: 400px;
      font-family: 'Google Sans', -apple-system, sans-serif;
      padding: 24px;
      background: radial-gradient(circle at top right, hsl(240 10% 12%), hsl(var(--background)));
      color: hsl(var(--text));
      margin: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    h2 { 
      margin: 0; 
      font-size: 20px; 
      font-weight: 700; 
      color: hsl(var(--text)); 
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.02em;
    }

    h2 svg {
      color: hsl(var(--primary));
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .profile-icon {
      color: hsl(var(--muted));
      cursor: pointer;
      transition: color 0.2s;
    }
    .profile-icon:hover {
      color: hsl(var(--text));
    }

    .queue-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px 0;
      max-height: 180px;
      overflow-y: auto;
    }
    .queue-list::-webkit-scrollbar {
      width: 4px;
    }
    .queue-list::-webkit-scrollbar-thumb {
      background: hsl(var(--border));
      border-radius: 4px;
    }
    .queue-item {
      background: hsl(var(--background) / 0.5);
      border: 1px solid hsl(var(--border));
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .queue-item span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .remove-btn {
      background: none;
      border: none;
      color: hsl(var(--error));
      cursor: pointer;
      padding: 4px;
    }
    .remove-btn:hover {
      opacity: 0.8;
    }

    .view-card {
      background: hsl(var(--card) / 0.85);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .input-group { 
      margin-bottom: 14px; 
    }

    label { 
      display: block; 
      font-size: 13px; 
      font-weight: 700;
      margin-bottom: 6px; 
      color: hsl(var(--muted)); 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }

    input {
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      background: hsl(var(--background) / 0.5);
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      color: hsl(var(--text));
      font-size: 14px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    input:focus {
      outline: none;
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.15);
      background: hsl(var(--background));
    }

    button.btn-primary {
      font-family: inherit;
      width: 100%;
      padding: 12px;
      background-color: hsl(var(--primary));
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px hsl(var(--primary) / 0.25);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button.btn-primary:hover { 
      background-color: hsl(var(--primary-hover));
      box-shadow: 0 6px 16px hsl(var(--primary) / 0.3);
    }

    button.btn-primary:active {
      box-shadow: 0 2px 8px hsl(var(--primary) / 0.25);
    }

    button.btn-secondary {
      font-family: inherit;
      width: 100%;
      padding: 12px;
      background-color: hsl(var(--background));
      color: hsl(var(--text));
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button.btn-secondary:hover { 
      background-color: hsl(var(--card));
      border-color: hsl(var(--primary) / 0.5);
    }

    button.btn-secondary:disabled { 
      background-color: hsl(var(--background));
      cursor: not-allowed; 
      color: hsl(var(--muted));
      border-color: hsl(var(--border) / 0.5);
    }

    button.btn-primary:disabled { 
      background-color: hsl(var(--border)); 
      cursor: not-allowed; 
      color: hsl(var(--muted));
      box-shadow: none;
      transform: none;
    }

    #status { 
      margin-top: 16px; 
      font-size: 13px; 
      font-weight: 500;
      text-align: center; 
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }

    #status.success { 
      display: block;
      color: hsl(var(--success)); 
      background: hsl(var(--success) / 0.1);
      border: 1px solid hsl(var(--success) / 0.2);
    }

    #status.error { 
      display: block;
      color: hsl(var(--error)); 
      background: hsl(var(--error) / 0.1);
      border: 1px solid hsl(var(--error) / 0.2);
    }

    .hidden { display: none !important; }
    
    .footer-actions {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid hsl(var(--border));
      padding-top: 12px;
    }

    .text-link {
      font-family: inherit;
      font-size: 13px;
      color: hsl(var(--muted));
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-weight: 500;
      transition: color 0.15s;
    }

    .text-link:hover { 
      color: hsl(var(--error)); 
    }

    .pulse {
      animation: pulse-animation 2s infinite;
    }

    @keyframes pulse-animation {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h2>
      <div style="width:24px; height:24px; border-radius: 6px; background: linear-gradient(to bottom right, #2563eb, #4f46e5, #7e22ce); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(79,70,229,0.3);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
      </div>
      CareerAgent
    </h2>
    <div id="profileBtn" class="profile-icon hidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </div>
  </div>

  <!-- Login View -->
  <div id="loginView" class="view-card">
    <div class="input-group">
      <label for="apiUrl">Backend API URL</label>
      <input type="text" id="apiUrl" value="http://127.0.0.1:8000" />
    </div>
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" />
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" />
    </div>
    <button id="loginBtn" class="btn-primary" style="margin-top: 8px;">
      Log In & Sync
    </button>
  </div>

  <!-- Queue Action View -->
  <div id="actionView" class="view-card hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <label style="margin: 0;">QUEUE (<span id="queueCount">0</span>)</label>
    </div>
    
    <ul id="queueList" class="queue-list">
      <!-- Dynamically populated -->
    </ul>

    <button id="addBtn" class="btn-secondary" style="margin-bottom: 12px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Add Current Page
    </button>

    <button id="processBtn" class="btn-primary" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      Process Queue
    </button>
  </div>

  <!-- Settings View -->
  <div id="settingsView" class="view-card hidden">
    <h3 style="margin: 0 0 16px 0; font-size: 16px; font-weight: 700;">Settings</h3>
    <p style="font-size: 14px; color: hsl(var(--muted)); margin-bottom: 16px;">
      Logged in as: <span id="activeUser" style="color: hsl(var(--text)); font-weight: 500;"></span>
    </p>

    <div class="input-group" style="margin-bottom: 24px;">
      <label for="whitelistInput">Allowed Sites (comma separated)</label>
      <input type="text" id="whitelistInput" placeholder="linkedin.com, naukri.com, indeed.com" />
    </div>

    <button id="logoutBtn" class="btn-primary" style="background-color: hsl(var(--error)); box-shadow: 0 4px 12px hsl(var(--error) / 0.25);">Log Out</button>
    <button id="backBtn" class="text-link" style="width: 100%; text-align: center; margin-top: 16px;">Back to Queue</button>
  </div>

  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
