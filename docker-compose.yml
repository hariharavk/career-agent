version: '3.8'

services:
  backend:
    image: ghcr.io/koteshrv/career-agent-backend:main
    ports:
      - "8000:8000"
    volumes:
      # Mount a single data directory for all databases and encryption keys
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      # Auth credentials — change these before exposing the app to the internet!
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-admin}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Tell the app to save the SQLite database in the mapped data folder
      - DATABASE_URL=sqlite:////app/data/jobs.db
    restart: unless-stopped

  frontend:
    image: ghcr.io/koteshrv/career-agent-frontend:main
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
